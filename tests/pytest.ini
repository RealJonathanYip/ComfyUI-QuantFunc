; Anchor pytest's rootdir at this tests/ directory.
;
; Without this, `pytest tests/test_*.py` from the repo root auto-detects rootdir
; as the repo root, whose __init__.py does `from .nodes import ...` (a relative
; import that fails outside a live ComfyUI) -> every test ERRORs at collection.
; The presence of this ini file makes tests/ the rootdir, so collection never
; walks up into the repo-root __init__.py. Tests import the plugin module via the
; sys.path insert at the top of each test file (works under both plain
; `python3 tests/test_*.py` and `pytest`).
[pytest]
